model:
  name: "Qwen/Qwen3.5-0.8B"
  load_in_4bit: true

lora:
  r: 16
  alpha: 32
  target_modules: "all-linear"
  finetune_vision_layers: false
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true
  lora_dropout: 0
  bias: "none"

training:
  batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  epochs: 20
  optimizer: "adamw_8bit"
  gradient_checkpointing: "unsloth"
  max_seq_length: 2048
  warmup_steps: 5
  logging_steps: 10
  save_steps: 50

data:
  action_horizon: 5
  rdp_epsilon: 2.0
  train_split: 0.8
  chunk_stride: 2
  dataset_path: "data/processed"
  instructions: "configs/instructions.yaml"
  checkpoint_dir: "models/checkpoints"
  raw:
    sessions: "data/raw/sessions"
    frames: "data/raw/frames"
  interim:
    compressed: "data/interim/compressed"
    chunks: "data/interim/chunks"

inference:
  max_chunks: 100
  ensemble_execute_k: 1
  max_new_tokens: 2048

rl:
  enabled: true
  epochs: 3
  learning_rate: 1.0e-6
  per_device_batch_size: 1
  gradient_accumulation_steps: 8
  num_generations: 4
  temperature: 0.7
  top_p: 0.9
  beta: 0.1
  max_prompt_length: 2048
  max_completion_length: 2048
  save_steps: 50
  warmup_sft_first: true
  max_grad_norm: 0.1
  warmup_ratio: 0.1
  lr_scheduler_type: cosine
