model:
  name: "Qwen/Qwen3.5-4B"
  load_in_4bit: false
  # use_unsloth=true selects Unsloth's FastVisionModel path (best for the 8GB
  # laptop, supports QLoRA + 8-bit optim). use_unsloth=false uses plain HF +
  # PEFT -- use this on bigger GPUs to bypass Unsloth's vision-tower quirks
  # (forced 512x512 patch embed, vision tower require_grad).
  use_unsloth: false

lora:
  r: 16
  alpha: 32
  target_modules: "all-linear"
  # Phase 2: unfreeze vision LoRA. With `target_modules: all-linear`, LoRA
  # adapters were already attached to the vision tower's Linear modules; this
  # flag controls whether `_freeze_vision_tower` runs after `apply_lora`. True
  # → keep vision adapters trainable so the encoder can adapt to 512² synthetic
  # canvases that the natural-photo-pretrained ViT cannot perceive precisely.
  finetune_vision_layers: true
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true
  lora_dropout: 0.05
  bias: "none"

training:
  batch_size: 4
  eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-4
  epochs: 12
  optimizer: "adamw_torch"
  gradient_checkpointing: true
  # Bumped 768 → 1024 for Phase 3 (history injection). Text-only p95 hits 594
  # tokens and the image adds ~100-300 image tokens, so 768 is too tight.
  max_seq_length: 1024
  warmup_steps: 50
  logging_steps: 10
  weight_decay: 0.01
  early_stopping_patience: 2
  early_stopping_threshold: 0.001
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  tensorboard_dir: "logs/tensorboard"
  # Phase 5.5.1: per-token loss weight applied to tokens inside any
  # `{"action_type":"noop"}` action span. Noop actions are only ~2.2% of
  # training actions (22 / 1010), so plain CE never strongly rewards
  # confident noop emission and at inference T=0.5 the noop probability
  # collapses (model never terminates). 1.0 = current behavior; 3.0 =
  # the §5.5.1 experiment. HF path only — Unsloth path warns if != 1.0.
  noop_loss_weight: 3.0

data:
  action_horizon: 2
  # Phase 3: number of past executed chunks to inject as text into the user
  # message ("Recent actions:\n<chunk_-2>\n<chunk_-1>\n\nInstruction: ...").
  # 0 disables history. Set to 2 by default — at horizon=2 each prior chunk
  # is ~40-90 tokens (sentinel-encoded), so N=2 adds ~80-180 tokens, well
  # within the 768-token seq budget.
  history_length: 2
  rdp_epsilon: 2.0
  train_split: 0.8
  chunk_stride: 1
  dataset_path: "data/processed"
  instructions: "configs/instructions.yaml"
  checkpoint_dir: "models/checkpoints"

  # Phase 5.5.2: per-task chunk replication weights. Each session's records
  # are duplicated int(weight * weight_scale) times before train/val split,
  # so weight=1.5 ≈ 1.5× the per-epoch sampling frequency vs weight=1.0.
  # Empty {} or omitted -> no weighting (weight=1.0 for all tasks, scale=1).
  # Initial weights target the §5.5.1 over-draw failure modes:
  #   - Up-weight targeted-warp tasks (jolie / strawberry / jaap_stam smile;
  #     brad_pitt; jolie_sad) because the §5.5.1 sweep showed warp inference
  #     still mostly draws on the wrong region — more exposure should help.
  #   - Down-weight single-stroke tasks (stain, red_stickman) so they don't
  #     dilute the gradient for the harder iterative tasks.
  # scale=2 means weights {0.5, 1.0, 1.5} -> {1, 2, 3} copies; relative
  # balance preserved with 2× dataset bloat (vs 4× at scale=4). Bump to
  # 4 if finer weights (0.25 / 0.75) are needed.
  weight_scale: 2
  instruction_weights:
    # targeted-warp (region-precise deformation) — boost
    brad_pitt_smile: 1.5
    jolie_sad: 1.5
    jaap_stam_smile: 1.5
    strawberry_heart: 1.5
    # single-stroke quick tasks — dampen
    stain: 0.5
    red_stickman: 0.5
  raw:
    sessions: "data/raw/sessions"
    frames: "data/raw/frames"
  interim:
    compressed: "data/interim/compressed"
    chunks: "data/interim/chunks"

inference:
  # Phase 5.4 deployed defaults — eight-prompt sweep at (T=0.5, max=30)
  # produced 4 wins / 1 tie / 2 mild losses vs. (T=1.0, max=200) on the
  # §5.1 / §5.4.2 evaluation set. Net gain: object-removal / B&W / text
  # tasks now produce real edits; over-draw collapse on max-200 is gone.
  # Targeted-warp prompts (jolie / strawberry_heart) still fail under
  # either regime — that needs training-side work, not inference tuning.
  max_chunks: 30
  ensemble_execute_k: 2
  max_new_tokens: 256
  do_sample: true
  # T=1.0 leaked enough noop probability mass that the model would
  # accidentally emit a terminal chunk after destroying the canvas with
  # 100+ over-edits. T=0.5 sharpens per-step quality and the max_chunks=30
  # cap forces termination before damage accumulates.
  temperature: 0.5
  top_p: 1.0
  repetition_penalty: 1.0
  # If the parser drops every action in a chunk this many times consecutively,
  # stop inference with a "parse-failure budget exhausted" log (Phase 5.4.1).
  # Distinguishes infiltration-driven rejection from a model-emitted terminal
  # noop chunk, so a parse fail at step 0 no longer masquerades as "done."
  max_consecutive_parse_failures: 3

rl:
  enabled: true
  epochs: 3
  # Bumped from 2e-6: previous run sat at the GT-mimicry ceiling, so the rare
  # informative gradient steps (hard-tail prompts) need a stronger update to
  # actually move the policy.
  learning_rate: 5.0e-6
  per_device_batch_size: 4
  # Bumped 1→2 so generation_batch_size (per_device * grad_accum = 8) is
  # divisible by num_generations (8), per TRL's GRPOConfig invariant.
  gradient_accumulation_steps: 2
  num_generations: 8
  # Slightly above 1.0 to widen within-group reward variance: at temp=1.0 the
  # post-SFT policy collapsed many groups to identical 29-token GT mimics
  # (reward_std=0, frac_reward_zero_std=1, no gradient).
  temperature: 1.1
  top_p: 1.0
  # Lowered from 0.1 (TRL's GRPO default is 0.04). High beta + saturating
  # reward = loss dominated by KL with no policy movement.
  beta: 0.04
  repetition_penalty: 1.0
  max_prompt_length: 768
  max_completion_length: 384
  max_steps: 400
  save_steps: 100
  save_total_limit: 3
  warmup_sft_first: true
  # Bumped from 0.1: at 0.1 a single bad batch (kl spike) gets clipped so hard
  # the policy barely moves; 0.5 is gentler without letting spikes through.
  max_grad_norm: 0.5
  warmup_ratio: 0.1
  lr_scheduler_type: cosine
  # Drop "trivially easy" GRPO rows where the GT chunk barely changes the
  # canvas. SFT already nails these, so all `num_generations` generations land
  # on the same answer (reward_std=0, no gradient). Bumped from 50 to push the
  # training distribution onto the hard tail where RL can still extract signal.
  min_gt_pixels: 200
  # Phase 5.6: was a hard-coded +0.05 in rl_train.py:292-293 (Phase 4.2). §5.1
  # diagnosed it as the termination-breaker — non-terminal earned r + bonus,
  # terminal stayed at 0, so GRPO learned to never emit the all-noop chunk
  # at inference. 0.0 disables the bonus entirely (the §5.6 default); set to
  # 0.05 to restore the Phase-4.2 behavior for ablation.
  format_bonus: 0.0
  # Phase 7.4 / Phase 8: combined reward formula
  #   r = visual_weight * visual_reward + critic_weight * critic_reward
  #         + (format_bonus if non-terminal else 0)
  #
  # All terms are in [-1, 1] and the sum is clipped to [-1, 1] at the end.
  #   - visual_weight: 1.0 / critic_weight: 0.0  -> classic SSIM-only (§5.6 baseline)
  #   - visual_weight: 1.0 / critic_weight: 0.1  -> Phase 7.4 auxiliary critic
  #   - visual_weight: 0.0 / critic_weight: 1.0  -> Phase 8 GT-free regime
  # When visual_weight=0 the GT-canvas execution is skipped entirely (saves
  # ~30% per-step compute) — RL truly never touches the GT actions.
  visual_weight: 0.0
  critic_weight: 1.0
  critic_path: "models/critic"
